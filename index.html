    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=1b39ab278b34720c916eff1fe31ea422&libraries=services"></script>
    <script>
        console.log('=== 스크립트 시작 ===');
        
        // API Base URL 설정
        const API_BASE_URL = window.location.hostname === 'localhost' 
            ? 'http://138.2.127.70:8000' 
            : '';
        
        let map, allCafes = [], markers = [], activeMarkerIdx = null;
        let currentSort = 'score-high';
        let userLocation = null;
        let userMarker = null;
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let posts = JSON.parse(localStorage.getItem('cagongPosts')) || [];
        
        // 검색 초기화
        function clearSearch() {
            document.getElementById('topSearchInput').value = '';
            handleSearch({ key: 'Enter' });
        }
        
        // 구글맵 스타일 드래그 핸들
        let startY = 0;
        let currentY = 0;
        let isDragging = false;
        const sidebar = document.getElementById('sidebar');
        const dragHandle = document.querySelector('.sidebar-drag-handle');
        const sidebarTitle = document.querySelector('.sidebar-title');
        
        console.log('sidebar:', sidebar);
        console.log('dragHandle:', dragHandle);
        console.log('sidebarTitle:', sidebarTitle);
        
        if (dragHandle) {
            console.log('드래그 핸들 이벤트 등록');
            
            // 클릭 이벤트 추가
            dragHandle.addEventListener('click', () => {
                console.log('드래그 핸들 클릭');
                sidebar.classList.toggle('expanded');
                sidebar.classList.toggle('collapsed');
            });
            
            let touchStartTime = 0;
            let touchMoved = false;
            
            dragHandle.addEventListener('touchstart', e => {
                console.log('touchstart');
                startY = e.touches[0].clientY;
                isDragging = true;
                touchStartTime = Date.now();
                touchMoved = false;
                sidebar.style.transition = 'none';
            }, { passive: true });
            
            dragHandle.addEventListener('touchmove', e => {
                if (!isDragging) return;
                console.log('touchmove');
                touchMoved = true;
                currentY = e.touches[0].clientY;
                const deltaY = currentY - startY;
                
                if (deltaY > 0) {
                    const newTransform = Math.min(deltaY, window.innerHeight * 0.8);
                    sidebar.style.transform = `translateY(${newTransform}px)`;
                }
            }, { passive: true });
            
            dragHandle.addEventListener('touchend', e => {
                if (!isDragging) return;
                console.log('touchend');
                isDragging = false;
                sidebar.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                
                const touchDuration = Date.now() - touchStartTime;
                
                // 짧은 탭 (드래그 없이 클릭)
                if (!touchMoved && touchDuration < 300) {
                    console.log('드래그 핸들 탭');
                    sidebar.classList.toggle('expanded');
                    sidebar.classList.toggle('collapsed');
                    sidebar.style.transform = '';
                    return;
                }
                
                const deltaY = currentY - startY;
                if (deltaY > 100) {
                    sidebar.classList.remove('expanded');
                    sidebar.classList.add('collapsed');
                    sidebar.style.transform = '';
                } else {
                    sidebar.classList.add('expanded');
                    sidebar.classList.remove('collapsed');
                    sidebar.style.transform = '';
                }
            }, { passive: true });
        }
        
        // Coffee 타이틀 클릭으로 토글
        if (sidebarTitle) {
            console.log('타이틀 클릭 이벤트 등록');
            sidebarTitle.addEventListener('click', () => {
                console.log('타이틀 클릭');
                sidebar.classList.toggle('expanded');
                sidebar.classList.toggle('collapsed');
            });
        }

        // Service Worker 강제 업데이트 및 캐시 삭제
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                registrations.forEach(reg => reg.unregister());
            });
        }
        
        // 모든 localStorage 캐시 강제 삭제
        (function() {
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('cafe_')) {
                    keys.push(key);
                }
            }
            keys.forEach(key => localStorage.removeItem(key));
            console.log(`전체 캐시 ${keys.length}개 삭제`);
        })();
        
        window.addEventListener('load', function() {
            console.log('페이지 로드됨');
            if (typeof kakao !== 'undefined' && kakao.maps) {
                kakao.maps.load(initMap);
            } else {
                console.error('카카오 맵 로드 실패');
            }
            
            // 사용자 위치 가져오기
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        userLocation = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        console.log('사용자 위치:', userLocation);
                        showUserLocationMarker();
                    },
                    error => console.log('위치 권한 거부 또는 에러:', error)
                );
            }
        });
        
        function clearOldCache() {
            // localStorage에서 cafe_ 로 시작하는 모든 키 찾기
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('cafe_')) {
                    keys.push(key);
                }
            }
            
            // 타임스탬프 기준으로 정렬하여 오래된 것부터 삭제
            const items = keys.map(key => {
                try {
                    const item = JSON.parse(localStorage.getItem(key));
                    return { key, timestamp: item.timestamp || 0 };
                } catch {
                    return { key, timestamp: 0 };
                }
            }).sort((a, b) => a.timestamp - b.timestamp);
            
            // 가장 오래된 30% 삭제
            const deleteCount = Math.ceil(items.length * 0.3);
            for (let i = 0; i < deleteCount; i++) {
                localStorage.removeItem(items[i].key);
            }
            console.log(`오래된 캐시 ${deleteCount}개 삭제`);
        }
        
        // 페이지 로드 시 구버전 캐시 삭제
        (function() {
            const CACHE_VERSION = 'v20';
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('cafe_') && !key.startsWith(`cafe_${CACHE_VERSION}_`)) {
                    keys.push(key);
                }
            }
            keys.forEach(key => localStorage.removeItem(key));
            if (keys.length > 0) {
                console.log(`구버전 캐시 ${keys.length}개 삭제`);
            }
        })();
        
        function initMap() {
            console.log('지도 초기화');
            
            map = new kakao.maps.Map(document.getElementById('map'), {
                center: new kakao.maps.LatLng(37.3943, 126.9568),
                level: 5
            });
            
            kakao.maps.event.addListener(map, 'idle', searchCafes);
            searchCafes();
            
            // 로딩 화면 숨기기 (2초 후)
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
            }, 2000);
        }
        
        function searchCafes() {
            console.log('카페 검색 시작');
            const ps = new kakao.maps.services.Places();
            const center = map.getCenter();
            
            ps.keywordSearch('카페', (data, status) => {
                console.log('검색 결과:', status, data ? data.length : 0);
                if (status === kakao.maps.services.Status.OK) {
                    allCafes = data.map(place => ({
                        name: place.place_name,
                        address: place.address_name,
                        phone: place.phone || '',
                        latitude: parseFloat(place.y),
                        longitude: parseFloat(place.x),
                        workScore: 0  // 초기값
                    }));
                    renderCafeList(allCafes);
                    displayMarkers(allCafes);
                }
            }, {
                location: new kakao.maps.LatLng(center.getLat(), center.getLng()),
                radius: 5000,
                category_group_code: 'CE7'
            });
        }
        
        function sortAndRenderCafes() {
            // 작업 점수 순으로 정렬
            const sorted = [...allCafes].sort((a, b) => {
                const scoreA = a.detailData ? a.detailData.workScore : 0;
                const scoreB = b.detailData ? b.detailData.workScore : 0;
                return scoreB - scoreA;
            });
            
            const list = document.getElementById('cafeList');
            document.getElementById('cafeCount').textContent = sorted.length + ' cafes';
            
            list.innerHTML = sorted.map((cafe) => {
                const idx = allCafes.indexOf(cafe);
                const data = cafe.detailData;
                const signalColor = data ? data.signalColor : 'gray';
                
                let indicatorsHtml = '<div class="indicator">분석중...</div>';
                if (data) {
                    let html = '';
                    if (data.workScore > 0) html += '<div class="indicator">💼 ' + data.workScore + '/10</div>';
                    if (data.outletLevel !== '정보 없음') html += '<div class="indicator">🔌 ' + data.outletLevel + '</div>';
                    if (data.noiseLevel !== '정보 없음') html += '<div class="indicator">🔇 ' + data.noiseLevel + '</div>';
                    if (data.hasWifi) html += '<div class="indicator">📶 WiFi</div>';
                    if (data.blogCount > 0) html += '<div class="indicator">📝 ' + data.blogCount + '</div>';
                    indicatorsHtml = html || '<div class="indicator">정보 없음</div>';
                }
                
                return `
                    <div class="cafe-item" onclick="showCafeDetail(${idx})">
                        <div class="cafe-header">
                            <div class="signal-dot signal-${signalColor}"></div>
                            <div>
                                <div class="cafe-name">${cafe.name}</div>
                                <div class="cafe-address">${cafe.address}</div>
                            </div>
                        </div>
                        <div class="cafe-indicators">${indicatorsHtml}</div>
                    </div>
                `;
            }).join('');
        }
        
        function renderCafeList(cafes) {
            console.log('리스트 렌더링:', cafes.length);
            const list = document.getElementById('cafeList');
            document.getElementById('cafeCount').textContent = cafes.length + ' cafes';
            
            list.innerHTML = cafes.map((cafe, idx) => {
                const originalIdx = cafe.originalIdx !== undefined ? cafe.originalIdx : idx;
                return `
                    <div class="cafe-item" onclick="showCafeDetail(${originalIdx})">
                        <div class="cafe-header">
                            <div class="signal-dot signal-${cafe.detailData ? cafe.detailData.signalColor : 'gray'}" id="signal-${originalIdx}"></div>
                            <div>
                                <div class="cafe-name">${cafe.name}</div>
                                <div class="cafe-address">${cafe.address}</div>
                            </div>
                        </div>
                        <div class="cafe-indicators" id="indicators-${originalIdx}">
                            ${cafe.detailData ? getIndicatorsHtml(cafe.detailData) : '<div class="indicator">분석중...</div>'}
                        </div>
                    </div>
                `;
            }).join('');
            
            // 처음 렌더링할 때만 loadIndicators 호출 (순차 처리)
            if (cafes[0] && cafes[0].originalIdx === undefined) {
                cafes.forEach((cafe, idx) => {
                    cafe.originalIdx = idx;
                    setTimeout(() => loadIndicators(cafe, idx), idx * 100);
                });
            }
        }
        
        function getIndicatorsHtml(data) {
            let html = '';
            if (data.workScore > 0) html += '<div class="indicator">💼 ' + data.workScore + '/10</div>';
            if (data.outletLevel !== '정보 없음') html += '<div class="indicator">🔌 ' + data.outletLevel + '</div>';
            if (data.noiseLevel !== '정보 없음') html += '<div class="indicator">🔇 ' + data.noiseLevel + '</div>';
            if (data.hasWifi) html += '<div class="indicator">📶 WiFi</div>';
            if (data.blogCount > 0) html += '<div class="indicator">📝 ' + data.blogCount + '</div>';
            return html || '<div class="indicator">정보 없음</div>';
        }
        
        function sortCafes(sortType) {
            currentSort = sortType;
            
            // 버튼 활성화 상태 변경
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            let sortedCafes = [...allCafes];
            
            if (sortType === 'score-high') {
                sortedCafes.sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));
            } else if (sortType === 'score-low') {
                sortedCafes.sort((a, b) => (a.totalScore || 0) - (b.totalScore || 0));
            } else if (sortType === 'distance') {
                if (!userLocation) {
                    alert('위치 권한이 필요합니다. 브라우저 설정에서 위치 권한을 허용해주세요.');
                    return;
                }
                sortedCafes.sort((a, b) => {
                    const distA = getDistance(userLocation.lat, userLocation.lng, a.latitude, a.longitude);
                    const distB = getDistance(userLocation.lat, userLocation.lng, b.latitude, b.longitude);
                    return distA - distB;
                });
            }
            
            renderCafeList(sortedCafes);
        }
        
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; // 지구 반지름 (km)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        
        function handleSearch(event) {
            if (event.key === 'Enter' || !event.key) {
                const query = (event.target?.value || document.getElementById('topSearchInput').value).trim();
                if (!query) {
                    // 검색어 없으면 현재 위치로 리셋
                    if (userLocation) {
                        map.setCenter(new kakao.maps.LatLng(userLocation.lat, userLocation.lng));
                    }
                    return;
                }
                
                searchLocation(query);
            }
        }
        
        function searchLocation(query) {
            const ps = new kakao.maps.services.Places();
            
            // 카페 + 검색어로 검색
            ps.keywordSearch(query + ' 카페', (data, status) => {
                if (status === kakao.maps.services.Status.OK && data.length > 0) {
                    // 첫 번째 결과로 이동
                    const place = data[0];
                    const moveLatLon = new kakao.maps.LatLng(place.y, place.x);
                    
                    // 지도 이동
                    map.setCenter(moveLatLon);
                    map.setLevel(3); // 줌인
                    
                    // 카페 검색 (자동으로 idle 이벤트 발생)
                } else {
                    // 카페 없이 지역만 검색
                    ps.keywordSearch(query, (data, status) => {
                        if (status === kakao.maps.services.Status.OK && data.length > 0) {
                            const place = data[0];
                            const moveLatLon = new kakao.maps.LatLng(place.y, place.x);
                            map.setCenter(moveLatLon);
                            map.setLevel(4);
                        } else {
                            alert('검색 결과가 없습니다.');
                        }
                    });
                }
            });
        }
        
        function showCafeDetail(idx) {
            const cafe = allCafes[idx];
            if (!cafe.detailData) {
                alert('데이터 로딩 중입니다. 잠시 후 다시 시도해주세요.');
                return;
            }
            
            // 지도 포커스
            map.setCenter(new kakao.maps.LatLng(cafe.latitude, cafe.longitude));
            map.setLevel(3);
            
            // 이전 활성 마커 비활성화
            if (activeMarkerIdx !== null) {
                const prevMarker = document.getElementById('marker-' + activeMarkerIdx);
                if (prevMarker) prevMarker.classList.remove('active');
            }
            
            // 현재 마커 활성화
            const currentMarker = document.getElementById('marker-' + idx);
            if (currentMarker) currentMarker.classList.add('active');
            activeMarkerIdx = idx;
            
            showModal(cafe, cafe.detailData);
        }
        
        // 현재 위치로 이동
        document.getElementById('currentLocationBtn').addEventListener('click', () => {
            if (!userLocation) {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        position => {
                            userLocation = {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude
                            };
                            map.setCenter(new kakao.maps.LatLng(userLocation.lat, userLocation.lng));
                            map.setLevel(4);
                            showUserLocationMarker();
                        },
                        () => alert('위치 권한이 필요합니다.')
                    );
                } else {
                    alert('브라우저가 위치 서비스를 지원하지 않습니다.');
                }
            } else {
                map.setCenter(new kakao.maps.LatLng(userLocation.lat, userLocation.lng));
                map.setLevel(4);
            }
        });
        
        function showModal(cafe, data) {
            let html = '<h2 style="margin-bottom:20px;">' + cafe.name + '</h2>';
            
            // 카공 지표 카드
            html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:20px 0;">';
            
            if (data.workScore > 0) {
                html += '<div style="padding:16px;background:#e8f5e9;border-radius:8px;text-align:center;">' +
                    '<div style="font-size:24px;">💼</div>' +
                    '<div style="font-size:20px;font-weight:bold;margin:8px 0;">' + data.workScore + '/10</div>' +
                    '<div style="font-size:12px;color:#666;">작업 적합도</div></div>';
            }
            
            if (data.outletLevel !== '정보 없음') {
                html += '<div style="padding:16px;background:#fff3e0;border-radius:8px;text-align:center;">' +
                    '<div style="font-size:24px;">🔌</div>' +
                    '<div style="font-size:14px;font-weight:bold;margin:8px 0;">' + data.outletLevel + '</div>' +
                    '<div style="font-size:12px;color:#666;">콘센트</div></div>';
            }
            
            if (data.noiseLevel !== '정보 없음') {
                html += '<div style="padding:16px;background:#e3f2fd;border-radius:8px;text-align:center;">' +
                    '<div style="font-size:24px;">🔇</div>' +
                    '<div style="font-size:14px;font-weight:bold;margin:8px 0;">' + data.noiseLevel + '</div>' +
                    '<div style="font-size:12px;color:#666;">소음 레벨</div></div>';
            }
            
            if (data.tableHeight !== '정보 없음') {
                html += '<div style="padding:16px;background:#f3e5f5;border-radius:8px;text-align:center;">' +
                    '<div style="font-size:24px;">📏</div>' +
                    '<div style="font-size:14px;font-weight:bold;margin:8px 0;">' + data.tableHeight + '</div>' +
                    '<div style="font-size:12px;color:#666;">테이블 높이</div></div>';
            }
            
            if (data.spaceLevel && data.spaceLevel !== '정보 없음') {
                html += '<div style="padding:16px;background:#fff9c4;border-radius:8px;text-align:center;">' +
                    '<div style="font-size:24px;">📐</div>' +
                    '<div style="font-size:14px;font-weight:bold;margin:8px 0;">' + data.spaceLevel + '</div>' +
                    '<div style="font-size:12px;color:#666;">공간감</div></div>';
            }
            
            html += '</div>';
            
            // 기본 정보
            html += '<div style="margin:20px 0;line-height:1.8;background:#f5f5f5;padding:16px;border-radius:8px;">';
            html += '<div>📍 ' + cafe.address + '</div>';

        async function loadCafeStories(cafeName) {
            const container = document.getElementById('cafe-stories-content-' + cafeName.replace(/"/g, ''));
            if (!container) return;
            
            // localStorage에서 먼저 확인
            const cacheKey = 'stories_' + cafeName;
            const cached = localStorage.getItem(cacheKey);
            let stories = [];
            
            if (cached) {
                try {
                    const cacheData = JSON.parse(cached);
                    if (Date.now() - cacheData.timestamp < 60000) { // 1분 캐시
                        stories = cacheData.stories;
                    }
                } catch (e) {}
            }
            
            // 캐시가 없으면 API 호출
            if (stories.length === 0) {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/reviews/cafe/${encodeURIComponent(cafeName)}`);
                    if (response.ok) {
                        stories = await response.json();
                        
                        // localStorage에 캐시
                        localStorage.setItem(cacheKey, JSON.stringify({
                            timestamp: Date.now(),
                            stories: stories
                        }));
                    }
                } catch (err) {
                    console.error('Story API 실패:', err);
                }
            }
            
            allStories = stories;  // 전역 변수에 저장
            
            // 제목 업데이트

            let html = '';
            
            if (stories.length > 0) {
                stories.forEach(function(story) {
                    const isMyStory = currentUser && currentUser.id === story.user_id;
                    const images = story.image_url ? story.image_url.split(',') : [];
                    const contentPreview = (story.content || story.review_text || '').substring(0, 100);

        function updateMarker(idx, data) {
            const markerIcon = document.getElementById('marker-' + idx);
            if (markerIcon && data) {
                const oldColor = markerIcon.className.split(' ')[1];
                const newColor = data.signalColor || 'gray';
                
                // 0.0점이면 no-score 클래스 추가
                if (data.totalScore === 0) {
                    markerIcon.className = 'marker-icon no-score';
                } else {
                    markerIcon.className = 'marker-icon ' + newColor;
                }
                
                // z-index 업데이트
                const zIndexMap = { green: 1000, yellow: 900, red: 800, gray: 700 };
                if (markers[idx]) {
                    markers[idx].setZIndex(zIndexMap[newColor] || 700);
                }
                
                const scoreEl = markerIcon.querySelector('.marker-score');
                if (scoreEl && data.totalScore !== undefined) {
                    // 0.0점이면 점수 숨기기
                    if (data.totalScore === 0) {
                        scoreEl.style.display = 'none';
                    } else {
                        scoreEl.textContent = data.totalScore.toFixed(1);
                        scoreEl.style.display = 'block';
                    }
                }
                
                // 평점이 있으면 카페 이름 표시
                const nameEl = document.getElementById('marker-name-' + idx);
                if (nameEl && data.totalScore > 0) {
                    nameEl.classList.remove('hidden');
                }
            }
        }
        
        async function loadIndicators(cafe, idx, retryCount = 0) {
            try {
                // localStorage 캐시 확인 (버전 포함)
                const CACHE_VERSION = 'v19';  // 이전 캐시 사용
                const cacheKey = `cafe_${CACHE_VERSION}_${cafe.name}_${cafe.address}`;
                const cached = localStorage.getItem(cacheKey);
                
                let data;
                if (cached) {
                    const cachedData = JSON.parse(cached);
                    // 캐시가 24시간 이내면 사용
                    if (Date.now() - cachedData.timestamp < 24 * 60 * 60 * 1000) {
                        console.log('캐시 사용:', cafe.name);
                        data = cachedData.data;
                    }
                }
                
                // 캐시가 없거나 만료되면 API 호출
                if (!data) {
                    console.log('API 호출:', cafe.name);
                    const response = await fetch(`${API_BASE_URL}/api/blog-search`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: cafe.name, address: cafe.address })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    data = await response.json();
                    
                    // localStorage에 캐시 저장
                    try {
                        localStorage.setItem(cacheKey, JSON.stringify({
                            data: data,
                            timestamp: Date.now()
                        }));
                    } catch (e) {
                        // localStorage 용량 초과 시 오래된 캐시 삭제
                        if (e.name === 'QuotaExceededError') {
                            clearOldCache();
                            localStorage.setItem(cacheKey, JSON.stringify({
                                data: data,
                                timestamp: Date.now()
                            }));
                        }
                    }
                }
                
                // 카페 객체에 데이터 저장
                allCafes[idx].detailData = data;
                allCafes[idx].totalScore = data.totalScore || 0;
                
                // 마커 업데이트 (DOM이 준비될 때까지 약간 대기)
                setTimeout(() => updateMarker(idx, data), 100);
                
                const signalDot = document.getElementById('signal-' + idx);
                if (signalDot) {
                    signalDot.className = 'signal-dot signal-' + (data.signalColor || 'gray');
                }
                
                const indicators = document.getElementById('indicators-' + idx);
                if (indicators) {
                    let html = '';
                    if (data.workScore > 0) html += '<div class="indicator">💼 ' + data.workScore + '/10</div>';
                    if (data.outletLevel !== '정보 없음') html += '<div class="indicator">🔌 ' + data.outletLevel + '</div>';
                    if (data.noiseLevel !== '정보 없음') html += '<div class="indicator">🔇 ' + data.noiseLevel + '</div>';
                    if (data.hasWifi) html += '<div class="indicator">📶 WiFi</div>';
                    if (data.blogCount > 0) html += '<div class="indicator">📝 ' + data.blogCount + '</div>';
                    
                    indicators.innerHTML = html || '<div class="indicator">정보 없음</div>';
                }
                
                // 모든 카페 데이터 로드 완료 확인 후 정렬
                const loadedCount = allCafes.filter(c => c.detailData).length;
                if (loadedCount === allCafes.length) {
                    sortAndRenderCafes();
                }
            } catch (err) {
                console.log('지표 로드 실패:', cafe.name, err);
                
                // 재시도 로직 (최대 3번)
                if (retryCount < 3) {
                    console.log(`재시도 ${retryCount + 1}/3:`, cafe.name);

                    if (data.outletLevel && data.outletLevel !== '정보 없음') indicatorsHtml += '<div class="indicator">🔌 ' + data.outletLevel + '</div>';
                    if (data.noiseLevel && data.noiseLevel !== '정보 없음') indicatorsHtml += '<div class="indicator">🔇 ' + data.noiseLevel + '</div>';
                    if (data.spaceLevel && data.spaceLevel !== '정보 없음') indicatorsHtml += '<div class="indicator">📐 ' + data.spaceLevel + '</div>';
                    if (data.hasWifi) indicatorsHtml += '<div class="indicator">📶 WiFi</div>';
                    if (data.blogCount > 0) indicatorsHtml += '<div class="indicator">📝 ' + data.blogCount + '</div>';

        // BeforeInstallPrompt 이벤트 캐치 (Android)
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();

            // 배너를 닫지 않았고 설치되지 않았으면 3초 후 배너 표시
            if (!isPWAInstalled && !bannerDismissed) {

        // iOS 감지 및 배너 표시

                    if (choiceResult.outcome === 'accepted') {

        // Best 카페 로드
        async function loadBestCafes() {
            let region = '서울';
            
            // 사용자 위치로 지역 추출
            if (navigator.geolocation) {
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {timeout: 5000});
                    });
                    
                    // 역지오코딩으로 주소 가져오기
                    const geocoder = new kakao.maps.services.Geocoder();
                    const coord = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                    
                    await new Promise((resolve) => {
                        geocoder.coord2Address(coord.getLng(), coord.getLat(), (result, status) => {
                            if (status === kakao.maps.services.Status.OK && result[0]) {
                                const addr = result[0].address;
                                // 시/군/구 추출 (예: 안양시, 강남구)
                                region = addr.region_2depth_name || addr.region_1depth_name || '서울';
                                console.log('User region:', region);
                            }
                            resolve();
                        });
                    });
                } catch (err) {
                    console.log('위치 조회 실패, 서울 지역 표시');
                }
            }
            
            // API 호출
            try {
                const response = await fetch(`${API_BASE_URL}/api/best-cafes?region=${encodeURIComponent(region)}`);
                const cafes = await response.json();
                
                const html = cafes.map((cafe, idx) => `
                    <div style="border:1px solid #ddd;border-radius:8px;padding:15px;margin-bottom:15px;cursor:pointer;">
                        ${cafe.images && cafe.images[0] ? `
                            <img src="${cafe.images[0]}" style="width:100%;height:200px;object-fit:cover;border-radius:8px;margin-bottom:10px;">
                        ` : ''}
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                            <div style="font-weight:600;font-size:16px;">${idx + 1}. ${cafe.name}</div>
                            <div style="background:#4CAF50;color:white;padding:4px 12px;border-radius:12px;font-size:14px;font-weight:600;">
                                ${cafe.totalScore ? cafe.totalScore.toFixed(1) : '-'}
                            </div>
                        </div>
                        <div style="font-size:13px;color:#666;margin-bottom:8px;">${cafe.address}</div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
                            <span style="background:#f0f0f0;padding:4px 8px;border-radius:4px;font-size:12px;">⚡ ${cafe.outletLevel || '정보없음'}</span>
                            <span style="background:#f0f0f0;padding:4px 8px;border-radius:4px;font-size:12px;">📶 ${cafe.hasWifi ? 'WiFi' : 'WiFi 정보 없음'}</span>
                            <span style="background:#f0f0f0;padding:4px 8px;border-radius:4px;font-size:12px;">🔇 ${cafe.noiseLevel || '정보없음'}</span>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('bestList').innerHTML = html || '<p style="text-align:center;color:#999;padding:40px 0;">주변에 카페가 없습니다.</p>';
            } catch (err) {
                console.error('Best 카페 로드 실패:', err);
                document.getElementById('bestList').innerHTML = '<p style="text-align:center;color:#999;padding:40px 0;">데이터 로딩 실패</p>';
            }
        }

                                <input type="password" id="loginPw" placeholder="비밀번호" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:14px;box-sizing:border-box;">
                            </div>
                            <button onclick="login()" style="width:100%;padding:12px;background:#4CAF50;color:white;border:none;border-radius:4px;font-size:16px;cursor:pointer;margin-bottom:10px;">로그인</button>
                            <button onclick="showSignup()" style="width:100%;padding:12px;background:#fff;color:#4CAF50;border:1px solid #4CAF50;border-radius:4px;font-size:16px;cursor:pointer;margin-bottom:20px;">회원가입</button>
                            
                            <div style="border-top:1px solid #ddd;padding-top:20px;margin-top:20px;">
                                <p style="font-size:13px;color:#999;margin-bottom:15px;">소셜 로그인</p>
                                <div style="display:flex;gap:10px;justify-content:center;">
                                    <button onclick="socialLogin('google')" style="flex:1;padding:12px;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
                                        <span style="font-size:20px;">🔵</span>
                                        <span style="font-size:13px;">Google</span>
                                    </button>
                                    <button onclick="socialLogin('kakao')" style="flex:1;padding:12px;background:#FEE500;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
                                        <span style="font-size:20px;">💬</span>
                                        <span style="font-size:13px;">Kakao</span>
                                    </button>
                                    <button onclick="socialLogin('naver')" style="flex:1;padding:12px;background:#03C75A;color:white;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
                                        <span style="font-size:20px;">N</span>
                                        <span style="font-size:13px;">Naver</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // 내 리뷰 가져오기
                const token = localStorage.getItem('token');
                let myReviews = [];
                
                if (token) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/api/reviews/user/${currentUser.id}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (response.ok) {
                            myReviews = await response.json();
                            allStories = myReviews;  // 전역 변수에 저장
                        }
                    } catch (err) {
                        console.error('리뷰 로드 실패:', err);
                    }
                }
                
                document.getElementById('myPageContent').innerHTML = `
                    <div style="text-align:center;padding:20px;background:#f5f5f5;border-radius:8px;margin-bottom:20px;">
                        <div style="font-size:48px;margin-bottom:10px;">👤</div>
                        <div style="font-size:18px;font-weight:600;margin-bottom:5px;">${currentUser.name}</div>
                        <div style="font-size:14px;color:#666;">작성한 리뷰: ${myReviews.length}개</div>
                        <button onclick="logout()" style="margin-top:15px;padding:8px 20px;background:#fff;border:1px solid #ddd;border-radius:4px;cursor:pointer;">로그아웃</button>
                    </div>
                    <h3 style="margin-bottom:15px;">내가 작성한 리뷰</h3>
                    ${myReviews.map(r => {
                        const images = r.image_url ? r.image_url.split(',') : [];
                        return `
                        <div onclick="showReviewDetail(${r.id})" style="border:1px solid #ddd;border-radius:8px;padding:15px;margin-bottom:15px;position:relative;cursor:pointer;">
                            <div style="position:absolute;top:8px;right:8px;display:flex;gap:5px;z-index:10;">
                                <button onclick="event.stopPropagation();editStory(${r.id})" style="padding:4px 8px;background:#2196F3;color:white;border:none;border-radius:4px;font-size:11px;cursor:pointer;">수정</button>
                                <button onclick="event.stopPropagation();deleteStory(${r.id},'${r.cafe_name.replace(/'/g, "\\'")}')" style="padding:4px 8px;background:#f44336;color:white;border:none;border-radius:4px;font-size:11px;cursor:pointer;">삭제</button>
                            </div>
                            <div style="display:flex;justify-content:space-between;margin-bottom:10px;padding-right:100px;">
                                <div style="font-weight:600;">${r.cafe_name}</div>
                                <div>${'⭐'.repeat(r.rating)}</div>
                            </div>
                            ${images.length > 0 ? `<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:8px;">${images.map(img => `<img src="${img.trim()}" style="height:80px;border-radius:4px;flex-shrink:0;">`).join('')}</div>` : ''}
                            <div style="font-size:14px;color:#333;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${(r.content || r.review_text).substring(0, 100)}${(r.content || r.review_text).length > 100 ? '...' : ''}</div>
                            <div style="font-size:12px;color:#999;margin-top:8px;">${new Date(r.created_at).toLocaleDateString()}</div>
                        </div>
                    `;
                    }).join('') || '<p style="text-align:center;color:#999;padding:20px 0;">아직 작성한 리뷰가 없습니다.</p>'}
                `;
            }
        }
        
        function showLoginPrompt(returnPage) {
            if (confirm('로그인이 필요한 기능입니다. 로그인하시겠습니까?')) {
                showPage('mypage');
            } else {
                showPage('map');
            }
        }
        
        async function login() {
            const id = document.getElementById('loginId').value.trim();
            const pw = document.getElementById('loginPw').value;
            
            if (!id || !pw) {
                alert('아이디와 비밀번호를 입력해주세요.');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: id, password: pw })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    currentUser = { id: data.user.user_id, name: data.user.nickname, email: data.user.email };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    alert('로그인 성공!');
                    loadMyPage();
                } else {
                    alert('아이디 또는 비밀번호가 일치하지 않습니다.');
                }
            } catch (err) {
                alert('로그인 실패: ' + err.message);
            }
        }
        
        function showSignup() {
            document.getElementById('myPageContent').innerHTML = `
                <div style="max-width:400px;margin:0 auto;padding:20px;">
                    <h2 style="text-align:center;margin-bottom:30px;">회원가입</h2>
                    <div style="margin-bottom:15px;">
                        <label style="display:block;margin-bottom:5px;font-size:14px;font-weight:600;">아이디</label>
                        <input type="text" id="signupId" placeholder="4자 이상" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:14px;box-sizing:border-box;">
                    </div>
                    <div style="margin-bottom:15px;">
                        <label style="display:block;margin-bottom:5px;font-size:14px;font-weight:600;">비밀번호</label>
                        <input type="password" id="signupPw" placeholder="6자 이상" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:14px;box-sizing:border-box;">
                    </div>
                    <div style="margin-bottom:15px;">
                        <label style="display:block;margin-bottom:5px;font-size:14px;font-weight:600;">비밀번호 확인</label>
                        <input type="password" id="signupPwConfirm" placeholder="비밀번호 재입력" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:14px;box-sizing:border-box;">
                    </div>
                    <div style="margin-bottom:20px;">
                        <label style="display:block;margin-bottom:5px;font-size:14px;font-weight:600;">닉네임</label>
                        <input type="text" id="signupName" placeholder="2자 이상" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:14px;box-sizing:border-box;">
                    </div>
                    <button onclick="signup()" style="width:100%;padding:12px;background:#4CAF50;color:white;border:none;border-radius:4px;font-size:16px;cursor:pointer;margin-bottom:10px;">가입하기</button>
                    <button onclick="loadMyPage()" style="width:100%;padding:12px;background:#fff;color:#666;border:1px solid #ddd;border-radius:4px;font-size:16px;cursor:pointer;">취소</button>
                </div>
            `;
        }
        
        async function signup() {
            const id = document.getElementById('signupId').value.trim();
            const pw = document.getElementById('signupPw').value;
            const pwConfirm = document.getElementById('signupPwConfirm').value;
            const name = document.getElementById('signupName').value.trim();
            
            if (id.length < 4) {
                alert('아이디는 4자 이상이어야 합니다.');
                return;
            }
            if (pw.length < 6) {
                alert('비밀번호는 6자 이상이어야 합니다.');
                return;
            }
            if (pw !== pwConfirm) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }
            if (name.length < 2) {
                alert('닉네임은 2자 이상이어야 합니다.');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: id, password: pw, nickname: name })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    currentUser = { id: data.user.user_id, name: data.user.nickname, email: data.user.email };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    alert('회원가입 성공!');
                    loadMyPage();
                } else {
                    const error = await response.json();
                    alert('회원가입 실패: ' + (error.error || '알 수 없는 오류'));
                }
            } catch (err) {
                alert('회원가입 실패: ' + err.message);
            }
        }
        
        function socialLogin(provider) {
            alert(`${provider} 소셜 로그인은 준비 중입니다.\n현재는 일반 로그인을 이용해주세요.`);
            // TODO: 실제 소셜 로그인 구현 시
            // Google: OAuth 2.0
            // Kakao: Kakao Login API
            // Naver: Naver Login API
        }
        
        function showLoginForm() {
            loadMyPage();
        }
        
        function logout() {
            if (confirm('로그아웃하시겠습니까?')) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                loadMyPage();
            }
        }
        
        // 특정 카페에 대한 Story 작성
        function writeStoryForCafe(cafeName) {
            if (!currentUser) {
                if (confirm('로그인이 필요합니다. 로그인하시겠습니까?')) {
                    showPage('mypage');
                }
                return;
            }
            
            // 모달 닫기 (bottomNav는 제외)
            document.querySelectorAll('div[style*="position:fixed"][style*="z-index:2000"]').forEach(el => {
                if (el.id !== 'bottomNav') el.remove();
            });
            
            // 포스팅 페이지로 이동
            showPage('post');
            
            // 카페 자동 선택
            setTimeout(() => {
                const cafeSelect = document.getElementById('postCafe');
                if (cafeSelect) {
                    const cafeIndex = allCafes.findIndex(c => c.name === cafeName);
                    if (cafeIndex !== -1) {
                        cafeSelect.value = cafeIndex;
                    }
                }
            }, 100);
        }
    </script>
</body>
